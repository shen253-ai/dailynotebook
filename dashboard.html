<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Project Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .bar {
      background: #eee;
      height: 20px;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .fill {
      background: #4caf50;
      height: 100%;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 5px;
    }

    .todo {
      color: #e53935;
    }

    .done {
      color: #4caf50;
    }
  </style>
</head>

<body>

<h1>📊 Project Dashboard</h1>

<div class="container" id="projects"></div>

<script>
fetch('./data/projects.json?t=' + new Date().getTime())
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('projects');

    data.projects.forEach(p => {
      const div = document.createElement('div');
      div.className = 'card';

      div.innerHTML = `
        <h2>${p.name}</h2>

        <div class="bar">
          <div class="fill" style="width:${p.progress}%"></div>
        </div>
        <p><b>${p.progress}%</b> completed</p>

        <h3>📋 All Tasks</h3>
        <ul>
          ${p.tasks.map(t => `
            <li class="${t.done ? 'done' : 'todo'}">
              ${t.done ? '✅' : '⬜'} ${t.text}
            </li>
          `).join('')}
        </ul>

        <h3>🔥 TODO</h3>
        <ul>
          ${p.todos.map(t => `<li class="todo">⬜ ${t}</li>`).join('')}
        </ul>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
