name: Update Projects

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate JSON
        run: |
          mkdir -p _data
          echo '{"projects":[{"name":"Robotic Arm","progress":38,"todos":["写控制程序","设计结构"]}]}' > _data/projects.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add _data/projects.json
          git commit -m "update data" || echo "no changes"
          git push